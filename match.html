<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="theme.css">
    <!-- ==================== СТИЛИ ДЛЯ LITE ВЕРСИИ ==================== -->
    <style>
        .lite-version * {
            margin: 0;
            padding: 0;

        }

        }
        .lite-match-stats-container {
            max-width: 65vw;

        }
        .lite-back-link {

            color: #ffaa00;
            text-decoration: none;

        }

        }

        }
        .lite-top-panels {
            display: flex;
            gap: 1.5vw;
            margin-bottom: 2vh;

        }
        .lite-left-panel, .lite-right-panel {

            padding: 1.99vh 1.2vw;
            flex: 1;

        .lite-stats-table td:first-child { text-align: left; padding-left: 1vw; font-weight: 500; }
        .lite-stats-table th:nth-child(1) { width: 5vw; }
        .lite-stats-table th:nth-child(2) { width: 4vw; }

<body>

<!-- ==================== LITE ВЕРСИЯ ==================== -->
<div id="liteVersion" class="lite-version" style="display: none;">
    <div class="lite-match-stats-container">
        <div class="lite-top-panels">
            <div class="lite-left-panel" id="liteLeftPanel"></div>
            <div class="lite-right-panel" id="liteRightPanel"></div>
        </div>
        <div id="liteTableDoctors" class="lite-team-table lite-team-table-doctors"></div>
        <div id="liteTableOpponent" class="lite-team-table lite-team-table-opponent"></div>
        <a href="index.html" class="lite-back-link">← Назад к матчам</a>
    </div>
</div>

<!-- ==================== FULL ВЕРСИЯ ==================== -->
<div id="fullVersion" class="full-version" style="display: none;">
    <div class="full-match-stats-container">
        <div class="full-top-panels">
            <div class="full-left-panel" id="fullLeftPanel"></div>
            <div class="full-right-panel" id="fullRightPanel"></div>
        </div>
        <div id="fullTableDoctors" class="full-team-table full-team-table-doctors"></div>
        <div id="fullTableOpponent" class="full-team-table full-team-table-opponent"></div>
        <a href="index.html" class="full-back-link">← Назад к матчам</a>
    </div>
</div>

<!-- ==================== ЛОГИКА LITE ==================== -->
<script>
    const liteNickMapping = {
        '_map1ks_': 'map1ks',
        'fak_zhresko': 'dark_sasi',
        'd1amp0': 'D1amp0',
        'Iightwork': 'lightwork',
        'fortyfortea1': 'Dew1erMode'
    };
    function liteMapNick(nick) { return liteNickMapping[nick] || nick; }
    function liteRatingClass(rating) {
        if (rating >= 1.05) return 'lite-rating-high';
        if (rating <= 0.96) return 'lite-rating-low';
        return 'lite-rating-medium';
    }
    function liteFindTopPlayer(players, field) {
        if (!players.length) return null;
        let top = players[0];
        for (const p of players) if ((p[field] || 0) > (top[field] || 0)) top = p;
        return top;
    }
    function liteGetPlayerAvatar(nick, teamName) {
        const map = { 'dark_sasi':'player1.jpg', 'map1ks':'player2.jpg', 'D1amp0':'player4.jpg', 'Dew1erMode':'player3.jpg', 'lightwork':'player5.jpg' };
        if (map[nick]) return map[nick];
        return (teamName === 'Doctors') ? 'team-doctors.jpg' : 'opponent-logo.jpg';
    }
    function liteGetPlayerTeam(player, data) {
        if (data.playersDoctors.some(p => p.nick === player.nick)) return 'Doctors';
        return data.opponent || 'Opponent';
    }

    async function liteLoadMatch() {
        const urlParams = new URLSearchParams(window.location.search);
        const matchFile = urlParams.get('match');
        if (!matchFile) { document.getElementById('liteVersion').innerHTML = '<div class="lite-error-message">Ошибка: не указан матч</div>'; return; }
        try {
            const res = await fetch(`matches/${matchFile}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (data.playersDoctors) data.playersDoctors.forEach(p => p.nick = liteMapNick(p.nick));
            if (data.playersOpponent) data.playersOpponent.forEach(p => p.nick = liteMapNick(p.nick));

            const doctorsWin = data.teamDoctorsScore > data.teamOpponentScore;
            const opponentWin = data.teamOpponentScore > data.teamDoctorsScore;
            const tournament = data.tournament || 'Unknown Tournament';
            const dateRaw = data.date || '?';
            const dateParts = dateRaw.split('.');
            const formattedDate = dateParts.length === 3 ? `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}` : dateRaw;
            const mapName = data.map || '?';
            const mapSlug = (data.map || '').toLowerCase().replace(/[^a-z0-9]/g, '');
            const miniMapUrl = `maps/mini_${mapSlug}.jpg`;
            const started = data.started_site;
            const doctorsCt = data.scoreCtDoctors ?? 0;
            const doctorsT = data.scoreTDoctors ?? 0;
            const oppCt = data.lostCtDoctors ?? 0;
            const oppT = data.lostTDoctors ?? 0;
            let firstBracket, secondBracket;
            if (started === 'CT') {
                firstBracket = `<span class="lite-ct-color">${doctorsCt}</span> : <span class="lite-t-color">${oppCt}</span>`;
                secondBracket = `<span class="lite-t-color">${doctorsT}</span> : <span class="lite-ct-color">${oppT}</span>`;
            } else {
                firstBracket = `<span class="lite-t-color">${doctorsT}</span> : <span class="lite-ct-color">${oppT}</span>`;
                secondBracket = `<span class="lite-ct-color">${doctorsCt}</span> : <span class="lite-t-color">${oppCt}</span>`;
            }
            let doctorsRatingSum = 0, opponentRatingSum = 0;
            if (data.playersDoctors && data.playersDoctors.length) doctorsRatingSum = data.playersDoctors.reduce((s,p)=>s+(p.rating||0),0);
            if (data.playersOpponent && data.playersOpponent.length) opponentRatingSum = data.playersOpponent.reduce((s,p)=>s+(p.rating||0),0);
            const doctorsTeamRating = (doctorsRatingSum / (data.playersDoctors?.length || 1)).toFixed(2);
            const opponentTeamRating = (opponentRatingSum / (data.playersOpponent?.length || 1)).toFixed(2);

            const leftHtml = `
                <div class="lite-tournament-header"><div class="lite-tournament-name">${tournament}</div><div class="lite-match-date">${formattedDate}</div></div>
                <div class="lite-teams-score-row">
                    <div class="lite-team-score-block"><img class="lite-team-logo-small" src="team-doctors.jpg"><div class="lite-team-name-large">Doctors</div><div class="lite-team-score-large ${doctorsWin?'lite-score-win':'lite-score-lose'}">${data.teamDoctorsScore}</div></div>
                    <div class="lite-map-block"><div class="lite-map-name-large">${mapName}</div><div class="lite-map-mini"><img src="${miniMapUrl}" onerror="this.style.display='none'"></div></div>
                    <div class="lite-team-score-block"><img class="lite-team-logo-small" src="opponent-logo.jpg"><div class="lite-team-name-large">${data.opponent||'?'}</div><div class="lite-team-score-large ${opponentWin?'lite-score-win':'lite-score-lose'}">${data.teamOpponentScore}</div></div>
                </div>
                <div class="lite-breakdown-row"><div class="lite-breakdown-item"><span class="lite-breakdown-label">Breakdown:</span> (${firstBracket}) (${secondBracket})</div></div>
                <div class="lite-team-rating-row"><span>Team Rating:</span> <span>${doctorsTeamRating}</span> <span>${opponentTeamRating}</span></div>
            `;
            document.getElementById('liteLeftPanel').innerHTML = leftHtml;

            const allPlayers = [...(data.playersDoctors||[]), ...(data.playersOpponent||[])];
            const topKills = liteFindTopPlayer(allPlayers, 'kills');
            const topAssists = liteFindTopPlayer(allPlayers, 'assists');
            const topRating = liteFindTopPlayer(allPlayers, 'rating');

            let rightHtml = '<div class="lite-top-players-list">';
            if (topKills) {
                const team = liteGetPlayerTeam(topKills, data);
                const avatarSrc = liteGetPlayerAvatar(topKills.nick, team);
                const isDoctor = (team === 'Doctors');
                const link = isDoctor ? `player-stats.html?nick=${encodeURIComponent(topKills.nick)}` : '#';
                rightHtml += `<div class="lite-top-player-item">`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}"><img class="lite-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'"></a>`;
                } else {
                    rightHtml += `<img class="lite-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'">`;
                }
                rightHtml += `<div class="lite-top-player-info"><div class="lite-top-player-stat">Most kills: ${topKills.kills}</div>`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}" class="lite-player-link">${topKills.nick}</a>`;
                } else {
                    rightHtml += `<div>${topKills.nick}</div>`;
                }
                rightHtml += `</div></div>`;
            }
            if (topAssists) {
                const team = liteGetPlayerTeam(topAssists, data);
                const avatarSrc = liteGetPlayerAvatar(topAssists.nick, team);
                const isDoctor = (team === 'Doctors');
                const link = isDoctor ? `player-stats.html?nick=${encodeURIComponent(topAssists.nick)}` : '#';
                rightHtml += `<div class="lite-top-player-item">`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}"><img class="lite-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'"></a>`;
                } else {
                    rightHtml += `<img class="lite-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'">`;
                }
                rightHtml += `<div class="lite-top-player-info"><div class="lite-top-player-stat">Most assists: ${topAssists.assists}</div>`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}" class="lite-player-link">${topAssists.nick}</a>`;
                } else {
                    rightHtml += `<div>${topAssists.nick}</div>`;
                }
                rightHtml += `</div></div>`;
            }
            if (topRating) {
                const team = liteGetPlayerTeam(topRating, data);
                const avatarSrc = liteGetPlayerAvatar(topRating.nick, team);
                const isDoctor = (team === 'Doctors');
                const link = isDoctor ? `player-stats.html?nick=${encodeURIComponent(topRating.nick)}` : '#';
                rightHtml += `<div class="lite-top-player-item">`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}"><img class="lite-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'"></a>`;
                } else {
                    rightHtml += `<img class="lite-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'">`;
                }
                rightHtml += `<div class="lite-top-player-info"><div class="lite-top-player-stat">Best rating: ${topRating.rating}</div>`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}" class="lite-player-link">${topRating.nick}</a>`;
                } else {
                    rightHtml += `<div>${topRating.nick}</div>`;
                }
                rightHtml += `</div></div>`;
            }
            rightHtml += '</div>';
            document.getElementById('liteRightPanel').innerHTML = rightHtml;

            const sortByRating = (a,b) => (b.rating||0)-(a.rating||0);
            const doctorsSorted = [...(data.playersDoctors||[])].sort(sortByRating);
            const opponentSorted = [...(data.playersOpponent||[])].sort(sortByRating);

            function renderLiteTable(players, teamName, logoUrl) {
                if (!players.length) return `<h3><img src="${logoUrl}" alt="${teamName}"> ${teamName}</h3><p>Нет данных</p>`;
                const isDoctor = (teamName === 'Doctors');
                let html = `<h3><img src="${logoUrl}" alt="${teamName}"> ${teamName}</h3><table class="lite-stats-table"><thead><tr><th></th><th>K</th><th>D</th><th>A</th><th>Rating</th></tr></thead><tbody>`;
                for (const p of players) {
                    const nickDisplay = isDoctor ? `<a href="player-stats.html?nick=${encodeURIComponent(p.nick)}" class="lite-player-link">${p.nick}</a>` : p.nick;
                    html += `<tr><td style="text-align:left; padding-left:1vw;">${nickDisplay}</td><td>${p.kills||0}</td><td>${p.deaths||0}</td><td>${p.assists||0}</td><td class="${liteRatingClass(p.rating||0)}">${(p.rating||0).toFixed(2)}</td></tr>`;
                }
                html += `</tbody></table>`;

            document.getElementById('liteTableDoctors').innerHTML = renderLiteTable(doctorsSorted, 'Doctors', 'team-doctors.jpg');
            document.getElementById('liteTableOpponent').innerHTML = renderLiteTable(opponentSorted, data.opponent||'Opponent', 'opponent-logo.jpg');

            document.querySelector('.lite-version').style.backgroundColor = '#1a1d2b';
        } catch(err) {

            document.getElementById('liteVersion').innerHTML = `<div class="lite-error-message">Ошибка: ${err.message}</div>`;

    }
</script>

<!-- ==================== ЛОГИКА FULL ==================== -->
<script>
    const fullNickMapping = {
        '_map1ks_': 'map1ks',
        'fak_zhresko': 'dark_sasi',
        'd1amp0': 'D1amp0',
        'Iightwork': 'lightwork',
        'fortyfortea1': 'Dew1erMode'
    };
    function fullMapNick(nick) { return fullNickMapping[nick] || nick; }
    function fullRatingClass(rating) {
        if (rating >= 1.05) return 'full-rating-high';
        if (rating <= 0.96) return 'full-rating-low';
        return 'full-rating-medium';
    }
    function fullSwingClass(swing) { return swing >= 0 ? 'full-swing-positive' : 'full-swing-negative'; }
    function fullFindTopPlayer(players, field) {
        if (!players.length) return null;
        let top = players[0];
        for (const p of players) if ((p[field] || 0) > (top[field] || 0)) top = p;
        return top;
    }
    function fullGetPlayerAvatar(nick, teamName) {
        const map = { 'dark_sasi':'player1.jpg', 'map1ks':'player2.jpg', 'D1amp0':'player4.jpg', 'Dew1erMode':'player3.jpg', 'lightwork':'player5.jpg' };
        if (map[nick]) return map[nick];
        return (teamName === 'Doctors') ? 'team-doctors.jpg' : 'opponent-logo.jpg';
    }
    function fullGetPlayerTeam(player, data) {
        if (data.playersDoctors.some(p => p.nick === player.nick)) return 'Doctors';
        return data.opponent || 'Opponent';
    }

    async function fullLoadMatch() {
        const urlParams = new URLSearchParams(window.location.search);
        const matchFile = urlParams.get('match');
        if (!matchFile) { document.getElementById('fullVersion').innerHTML = '<div class="full-error-message">Ошибка: не указан матч</div>'; return; }
        try {
            const res = await fetch(`matches/${matchFile}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (data.playersDoctors) data.playersDoctors.forEach(p => p.nick = fullMapNick(p.nick));
            if (data.playersOpponent) data.playersOpponent.forEach(p => p.nick = fullMapNick(p.nick));

            const doctorsWin = data.teamDoctorsScore > data.teamOpponentScore;
            const opponentWin = data.teamOpponentScore > data.teamDoctorsScore;
            const tournament = data.tournament || 'Unknown Tournament';
            const dateRaw = data.date || '?';
            const dateParts = dateRaw.split('.');
            const formattedDate = dateParts.length === 3 ? `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}` : dateRaw;
            const mapName = data.map || '?';
            const mapSlug = (data.map || '').toLowerCase().replace(/[^a-z0-9]/g, '');
            const miniMapUrl = `maps/mini_${mapSlug}.jpg`;
            const started = data.started_site;
            const doctorsCt = data.scoreCtDoctors ?? 0;
            const doctorsT = data.scoreTDoctors ?? 0;
            const oppCt = data.lostCtDoctors ?? 0;
            const oppT = data.lostTDoctors ?? 0;
            let firstBracket, secondBracket;
            if (started === 'CT') {
                firstBracket = `<span class="full-ct-color">${doctorsCt}</span> : <span class="full-t-color">${oppCt}</span>`;
                secondBracket = `<span class="full-t-color">${doctorsT}</span> : <span class="full-ct-color">${oppT}</span>`;
            } else {
                firstBracket = `<span class="full-t-color">${doctorsT}</span> : <span class="full-ct-color">${oppT}</span>`;
                secondBracket = `<span class="full-ct-color">${doctorsCt}</span> : <span class="full-t-color">${oppCt}</span>`;
            }
            let doctorsRatingSum = 0, opponentRatingSum = 0;
            if (data.playersDoctors && data.playersDoctors.length) doctorsRatingSum = data.playersDoctors.reduce((s,p)=>s+(p.rating||0),0);
            if (data.playersOpponent && data.playersOpponent.length) opponentRatingSum = data.playersOpponent.reduce((s,p)=>s+(p.rating||0),0);
            const doctorsTeamRating = (doctorsRatingSum / (data.playersDoctors?.length || 1)).toFixed(2);
            const opponentTeamRating = (opponentRatingSum / (data.playersOpponent?.length || 1)).toFixed(2);

            const leftHtml = `
                <div class="full-tournament-header"><div class="full-tournament-name">${tournament}</div><div class="full-match-date">${formattedDate}</div></div>
                <div class="full-teams-score-row">
                    <div class="full-team-score-block"><img class="full-team-logo-small" src="team-doctors.jpg"><div class="full-team-name-large">Doctors</div><div class="full-team-score-large ${doctorsWin?'full-score-win':'full-score-lose'}">${data.teamDoctorsScore}</div></div>
                    <div class="full-map-block"><div class="full-map-name-large">${mapName}</div><div class="full-map-mini"><img src="${miniMapUrl}" onerror="this.style.display='none'"></div></div>
                    <div class="full-team-score-block"><img class="full-team-logo-small" src="opponent-logo.jpg"><div class="full-team-name-large">${data.opponent||'?'}</div><div class="full-team-score-large ${opponentWin?'full-score-win':'full-score-lose'}">${data.teamOpponentScore}</div></div>
                </div>
                <div class="full-breakdown-row"><div class="full-breakdown-item"><span class="full-breakdown-label">Breakdown: </span> (${firstBracket}) (${secondBracket})</div></div>
                <div class="full-team-rating-row"><span>Team Rating:</span> <span>${doctorsTeamRating}</span> <span>${opponentTeamRating}</span></div>
            `;
            document.getElementById('fullLeftPanel').innerHTML = leftHtml;

            const allPlayers = [...(data.playersDoctors||[]), ...(data.playersOpponent||[])];
            const topKills = fullFindTopPlayer(allPlayers, 'kills');
            const topDamage = fullFindTopPlayer(allPlayers, 'adr');
            const topAssists = fullFindTopPlayer(allPlayers, 'assists');
            const topRating = fullFindTopPlayer(allPlayers, 'rating');

            let rightHtml = '<div class="full-top-players-list">';
            if (topKills) {
                const team = fullGetPlayerTeam(topKills, data);
                const avatarSrc = fullGetPlayerAvatar(topKills.nick, team);
                const isDoctor = (team === 'Doctors');
                const link = isDoctor ? `player-stats.html?nick=${encodeURIComponent(topKills.nick)}` : '#';
                rightHtml += `<div class="full-top-player-item">`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}"><img class="full-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'"></a>`;
                } else {
                    rightHtml += `<img class="full-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'">`;
                }
                rightHtml += `<div class="full-top-player-info"><div class="full-top-player-stat">Most kills: ${topKills.kills}</div>`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}" class="full-player-link">${topKills.nick}</a>`;
                } else {
                    rightHtml += `<div>${topKills.nick}</div>`;
                }
                rightHtml += `</div></div>`;
            }
            if (topDamage) {
                const team = fullGetPlayerTeam(topDamage, data);
                const avatarSrc = fullGetPlayerAvatar(topDamage.nick, team);
                const isDoctor = (team === 'Doctors');
                const link = isDoctor ? `player-stats.html?nick=${encodeURIComponent(topDamage.nick)}` : '#';
                rightHtml += `<div class="full-top-player-item">`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}"><img class="full-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'"></a>`;
                } else {
                    rightHtml += `<img class="full-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'">`;
                }
                rightHtml += `<div class="full-top-player-info"><div class="full-top-player-stat">Most damage: ${topDamage.adr}</div>`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}" class="full-player-link">${topDamage.nick}</a>`;
                } else {
                    rightHtml += `<div>${topDamage.nick}</div>`;
                }
                rightHtml += `</div></div>`;
            }
            if (topAssists) {
                const team = fullGetPlayerTeam(topAssists, data);
                const avatarSrc = fullGetPlayerAvatar(topAssists.nick, team);
                const isDoctor = (team === 'Doctors');
                const link = isDoctor ? `player-stats.html?nick=${encodeURIComponent(topAssists.nick)}` : '#';
                rightHtml += `<div class="full-top-player-item">`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}"><img class="full-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'"></a>`;
                } else {
                    rightHtml += `<img class="full-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'">`;
                }
                rightHtml += `<div class="full-top-player-info"><div class="full-top-player-stat">Most assists: ${topAssists.assists}</div>`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}" class="full-player-link">${topAssists.nick}</a>`;
                } else {
                    rightHtml += `<div>${topAssists.nick}</div>`;
                }
                rightHtml += `</div></div>`;
            }
            if (topRating) {
                const team = fullGetPlayerTeam(topRating, data);
                const avatarSrc = fullGetPlayerAvatar(topRating.nick, team);
                const isDoctor = (team === 'Doctors');
                const link = isDoctor ? `player-stats.html?nick=${encodeURIComponent(topRating.nick)}` : '#';
                rightHtml += `<div class="full-top-player-item">`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}"><img class="full-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'"></a>`;
                } else {
                    rightHtml += `<img class="full-top-player-avatar" src="${avatarSrc}" onerror="this.src='opponent-logo.jpg'">`;
                }
                rightHtml += `<div class="full-top-player-info"><div class="full-top-player-stat">Best rating: ${topRating.rating}</div>`;
                if (isDoctor) {
                    rightHtml += `<a href="${link}" class="full-player-link">${topRating.nick}</a>`;
                } else {
                    rightHtml += `<div>${topRating.nick}</div>`;
                }
                rightHtml += `</div></div>`;
            }
            rightHtml += '</div>';
            document.getElementById('fullRightPanel').innerHTML = rightHtml;

            const sortByRating = (a,b) => (b.rating||0)-(a.rating||0);
            const doctorsSorted = [...(data.playersDoctors||[])].sort(sortByRating);
            const opponentSorted = [...(data.playersOpponent||[])].sort(sortByRating);

            function renderFullTable(players, teamName, logoUrl) {
                if (!players.length) return `<h3><img src="${logoUrl}" alt="${teamName}"> ${teamName}</h3><p>Нет данных</p>`;
                const isDoctor = (teamName === 'Doctors');
                let html = `<h3><img src="${logoUrl}" alt="${teamName}"> ${teamName}</h3><table class="full-stats-table"><thead><tr><th></th><th>Round Swing</th><th>K</th><th>D</th><th>A</th><th>ADR</th><th>HS%</th><th>Rating</th></tr></thead><tbody>`;
                for (const p of players) {
                    const swing = p.round_swing || 0;
                    const swingDisplay = (swing >= 0 ? '+' : '') + swing.toFixed(2) + '%';
                    const nickDisplay = isDoctor ? `<a href="player-stats.html?nick=${encodeURIComponent(p.nick)}" class="full-player-link">${p.nick}</a>` : p.nick;
                    html += `<tr><td style="text-align:left; padding-left:1vw;">${nickDisplay}</td><td class="${fullSwingClass(swing)}">${swingDisplay}</td><td>${p.kills||0}</td><td>${p.deaths||0}</td><td>${p.assists||0}</td><td>${p.adr||0}</td><td>${p.hs_percent||0}%</td><td class="${fullRatingClass(p.rating||0)}">${(p.rating||0).toFixed(2)}</td></tr>`;
                }
                html += `</tbody></table>`;
                return html;
            }
            document.getElementById('fullTableDoctors').innerHTML = renderFullTable(doctorsSorted, 'Doctors', 'team-doctors.jpg');
            document.getElementById('fullTableOpponent').innerHTML = renderFullTable(opponentSorted, data.opponent||'Opponent', 'opponent-logo.jpg');

            document.querySelector('.full-version').style.backgroundImage = `url('maps/background_${mapSlug}.jpg')`;
            document.querySelector('.full-version').style.backgroundColor = '#1a1d2b';
        } catch(err) {
            console.error(err);
            document.getElementById('fullVersion').innerHTML = `<div class="full-error-message">Ошибка: ${err.message}</div>`;
        }
    }
</script>

<!-- ==================== ВЫБОР ВЕРСИИ ==================== -->
<script>
    (async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const matchFile = urlParams.get('match');
        if (!matchFile) {
            document.body.innerHTML = '<div class="lite-error-message">Ошибка: не указан матч</div>';
            return;
        }
        try {
            const res = await fetch(`matches/${matchFile}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const isFull = data.version === 'Full';
            if (isFull) {
                document.getElementById('fullVersion').style.display = 'block';
                fullLoadMatch();
            } else {
                document.getElementById('liteVersion').style.display = 'block';
                liteLoadMatch();
            }
        } catch (err) {
            console.error(err);
            document.body.innerHTML = `<div class="lite-error-message">Ошибка загрузки матча: ${err.message}</div>`;
        }
    })();
</script>
