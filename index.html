<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Тёмная/светлая тема</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="light">
    <div class="theme-toggle">
        <input type="checkbox" id="themeSwitch">
        <label for="themeSwitch" class="slider">
            <i class="fa-solid fa-moon"></i>
            <i class="fa-solid fa-sun"></i>
        </label>
    </div>


    <!-- Начало HLTV-->

    <div class="hltv">
        <img src="hltv-pic.jpg" alt="logo" class="hltv-img">
        <span>HLTV</span>
    </div>


    <!-- Конец HLTV-->


    <!-- Начало 1 параграф-->

    <div class="roster">
        <div class="players">

            <div class="player-card">
                <img class="avatar" src="player1.jpg" alt="player1">
                <div class="nickname">dark_sasi</div>
            </div>

            <div class="player-card">
                <img class="avatar" src="player2.jpg" alt="player1">
                <div class="nickname">map1ks</div>
            </div>

            <div class="player-card">
                <img class="avatar" src="player3.jpg" alt="player1">
                <div class="nickname">Dew1erMode</div>
            </div>

            <div class="player-card">
                <img class="avatar" src="player4.jpg" alt="player1">
                <div class="nickname">D1amp0</div>
            </div>

            <div class="player-card">
                <img class="avatar" src="player5.jpg" alt="player1">
                <div class="nickname">lightwork</div>
            </div>


        </div>
        <div class="players-line"></div>
    </div>


    <div class="team-doctors">
        <img src="team-doctors.jpg" alt="team doctors logo" class="team-logo">
        <div class="team-text">
            <div class="russia">
                <img src="russia-flag.png" alt="Russian flag" class="flag-img">
                <span class="russia-text">Russia</span>
            </div>
            <h1 class="team-name">Doctors</h1>
        </div>
    </div>

    <span class="player-age"><strong>Average player age:</strong>               19</span>
    <span class="coach"><strong>Coach:</strong> Mikhail 'adski_profi' Bortsov</span>



    <div class="content">
        <h1></h1>
        <p></p>
    </div>



    <script src="script.js"></script>
</body>

</html>
