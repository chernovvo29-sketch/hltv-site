<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Тёмная/светлая тема</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="light">
    <div class="theme-toggle">
        <input type="checkbox" id="themeSwitch">
        <label for="themeSwitch" class="slider">
            <i class="fa-solid fa-moon"></i>
            <i class="fa-solid fa-sun"></i>
        </label>
    </div>

    <div class="hltv">
        <img src="hltv-pic.jpg" alt="logo" class="hltv-img">
        <span>HLTV</span>
    </div>

    <div class = "team-doctors">
        <img src = "team-doctors.jpg" alt = "team doctors logo" class = "team-logo">
        <h1 class = "team-name">Doctors</h1>
    </div>



    <div class="content">
        <h1></h1>
        <p></p>
    </div>



    <script src="script.js"></script>
</body>

</html>
