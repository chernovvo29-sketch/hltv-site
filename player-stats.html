<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Статистика игрока | Team Doctors</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .player-container {
            max-width: 55vw;
            margin: 0 auto;
            margin-top: 6vh;
            display: flex;
            flex-direction: column;
            gap: 3vh;
        }
        .player-card-left, .player-stats-right {
            background-color: #2d3246;
            padding: 1.5vw;
        }
        .player-card-left {
            display: flex;
            gap: 1.5vw;
            align-items: stretch;
        }
        .player-avatar {
            width: 10vw;
            max-height: 10vw;
            border-radius: 0;
            background-color: rgba(255,255,255,0.1);
        }
        .player-info-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .player-nick {
            font-size: 1.8vw;
            font-weight: bold;
            margin-left: 0;
        }
        .player-fullname {
            font-size: 1.1vw;
            display: flex;
            align-items: center;
            gap: 0.5vw;
            margin-top: 0.5vh;
            margin-left: 0.3vh;
        }
        .player-flag-img {
            width: 1.5vw;
            height: auto;
            display: inline-block;
            vertical-align: middle;
        }
        .player-details {
            margin-top: 1.5vh;
        }
        .player-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1vh;
            font-size: 0.9vw;
        }
        .info-label {
            color: #aaa;
        }
        .info-value {
            font-weight: bold;
        }
        .player-stats-right {
            display: flex;
            flex-direction: column;
        }
        .rating-block {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.5vh;
            margin-bottom: 2vh;
        }
        .main-rating {
            font-size: 1.2vw;
            font-weight: bold;
        }
        .elite-rating {
            font-size: 1.2vw;
            font-weight: bold;
            margin-bottom: 0.5vh; /* уменьшил отступ снизу */
        }
        /* Wingman Rating — просто строка без разделителя */
        .wingman-rating {
            font-size: 1.2vw;
            font-weight: bold;
            margin-top: 0.5vh; /* небольшой отступ сверху */
            display: flex;
            align-items: center;
            gap: 0.6vw;
        }
        .wm-toggle-input {
            display: none;
        }
        .wm-value {
            display: none;
        }
        .wm-toggle-input:checked ~ .wm-value {
            display: inline;
        }
        .wm-toggle-label {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.5vw;
            height: 1.5vw;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.12);
            font-size: 0.65vw;
            transition: background-color 0.2s ease;
        }
        .wm-toggle-label:hover {
            background-color: rgba(255, 255, 255, 0.28);
        }
        .wm-icon-expanded {
            display: none;
        }
        .wm-toggle-input:checked ~ .wm-toggle-label .wm-icon-collapsed {
            display: none;
        }
        .wm-toggle-input:checked ~ .wm-toggle-label .wm-icon-expanded {
            display: inline;
        }
        .stats-grid {
            display: flex;
            flex-direction: column;
            gap: 2.5vh;
        }
        .stats-row {
            display: flex;
            gap: 2vw;
            justify-content: space-between;
        }
        .stat-bar-item {
            flex: 1;
            text-align: center;
            position: relative;
        }
        .stat-label {
            font-size: 0.8vw;
            margin-bottom: 0.5vh;
        }
        .bar-container {
            width: 80%;
            height: 0.5vh;
            background-color: rgba(255,255,255,0.2);
            border-radius: 0.25vh;
            margin: 0.5vh auto;
            position: relative;
        }
        .bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 0.25vh;
            transition: width 0.3s;
        }
        .bar-value {
            font-size: 1.0vw;
            font-weight: bold;
            margin-top: 0.2vh;
        }
        .bar-status {
            font-size: 0.8vw;
            margin-top: 0.3vh;
        }
        .bar-status .status-good {
            display: block;
            text-align: right;
            padding-right: 16.7%;
        }
        .bar-status .status-bad {
            display: block;
            text-align: left;
            padding-left: 16.7%;
        }
        .bar-status .status-ok {
            display: block;
            text-align: center;
        }
        .bar-status .status-demonic {
            display: block;
            text-align: right;
            padding-right: 16.7%;
        }
        .status-good { color: #2ecc71; }
        .status-bad { color: #e74c3c; }
        .status-ok { color: #f1c40f; }
        .status-demonic {
            color: #ffffff;
            font-weight: 900;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.9), 0 0 12px rgba(255, 255, 255, 0.5);
        }
        .bar-fill-demonic {
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.9), 0 0 3px rgba(255, 255, 255, 1) inset;
        }
        .current-team-link {
            color: #d1cfca;
            text-decoration: none;
        }
        .current-team-link:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #ff6666;
            text-align: center;
            padding: 2vw;
            background: rgba(0,0,0,0.5);
            border-radius: 1vw;
        }
        .ns-text {
            color: #aaa;
        }
        @media (max-width: 768px) {
            .player-container {
                max-width: 90vw;
            }
            .player-card-left {
                flex-direction: column;
                align-items: center;
            }
            .stats-row {
                flex-direction: column;
                gap: 1.5vh;
            }
        }
    </style>
    <link rel="stylesheet" href="mobile.css">
</head>
<body>
    <div class="theme-toggle">
        <input type="checkbox" id="themeSwitch">
        <label for="themeSwitch" class="slider">
            <i class="fa-solid fa-moon"></i>
            <i class="fa-solid fa-sun"></i>
        </label>
    </div>
    <div class="hltv">
        <img src="photos/hltv-pic.jpg" alt="logo" class="hltv-img">
        <span>HLTV</span>
    </div>

    <div class="player-container" id="playerContainer">
        <div style="text-align: center; width: 100%; color: #fff;">Загрузка статистики...</div>
    </div>

    <script src="script.js"></script>
    <script>
        (async function() {
            const container = document.getElementById('playerContainer');
            const urlParams = new URLSearchParams(window.location.search);
            const nick = urlParams.get('nick');
            if (!nick) {
                container.innerHTML = '<div class="error-message">Ошибка: не указан игрок</div>';
                return;
            }

            if (typeof getAllMatches !== 'function') {
                container.innerHTML = '<div class="error-message">Ошибка: функция getAllMatches не найдена</div>';
                return;
            }

            function calculateAge(birthDate) {
                const today = new Date();
                let age = today.getFullYear() - birthDate.getFullYear();
                const m = today.getMonth() - birthDate.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                    age--;
                }
                return age;
            }

            async function getAllWingmanMatches() {
                try {
                    const indexResp = await fetch('matches_wingman/index.json');
                    if (!indexResp.ok) throw new Error('Не удалось загрузить список Wingman матчей');
                    const { matches: matchFiles } = await indexResp.json();
                    const matchesData = [];
                    for (const fileName of matchFiles) {
                        const res = await fetch(`matches_wingman/${fileName}`);
                        if (res.ok) {
                            const match = await res.json();
                            match.fileName = fileName;
                            matchesData.push(match);
                        } else {
                            console.warn(`Не удалось загрузить Wingman матч ${fileName}`);
                        }
                    }
                    matchesData.sort((a, b) => {
                        const getNumber = (fileName) => parseInt(fileName.split('_')[0], 10);
                        return getNumber(b.fileName) - getNumber(a.fileName);
                    });
                    return matchesData;
                } catch (err) {
                    console.error('Ошибка загрузки Wingman матчей:', err);
                    return [];
                }
            }

            let allMatches;
            let wingmanMatches = [];
            try {
                allMatches = await getAllMatches();
                wingmanMatches = await getAllWingmanMatches();
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="error-message">Ошибка загрузки матчей: ${err.message}</div>`;
                return;
            }

            // Сбор статистики из 5v5
            let allPlayerMatches = [];
            let fullMatches = [];
            let playerData = null;

            for (const match of allMatches) {
                let player = null;
                if (match.playersDoctors) {
                    const p = match.playersDoctors.find(p => p.nick === nick);
                    if (p) player = p;
                }
                if (!player && match.playersOpponent) {
                    const p = match.playersOpponent.find(p => p.nick === nick);
                    if (p) player = p;
                }
                if (player) {
                    allPlayerMatches.push({ match, player });
                    if (match.version === 'Full') fullMatches.push({ match, player });
                    if (!playerData) playerData = player;
                }
            }

            // Сбор статистики из Wingman
            let wingmanPlayerMatches = [];
            for (const match of wingmanMatches) {
                let player = null;
                if (match.playersDoctors) {
                    const p = match.playersDoctors.find(p => p.nick === nick);
                    if (p) player = p;
                }
                if (!player && match.playersOpponent) {
                    const p = match.playersOpponent.find(p => p.nick === nick);
                    if (p) player = p;
                }
                if (player) {
                    wingmanPlayerMatches.push({ match, player });
                }
            }

            if (!playerData && wingmanPlayerMatches.length === 0) {
                container.innerHTML = `<div class="error-message">Игрок "${nick}" не найден в матчах</div>`;
                return;
            }

            const playerProfiles = {
                'dark_sasi':   { fullname: 'Alexander Zubarev', birthDate: new Date(2007, 10, 9) },
                'Dew1erMode':  { fullname: 'Vadim Chernov', birthDate: new Date(2007, 8, 30) },
                'map1ks':      { fullname: 'Maxim', birthDate: new Date(2007, 9, 17) },
                'D1amp0':      { fullname: 'Dmitriy Galihin', birthDate: new Date(2007, 7, 24) },
                'lightwork':   { fullname: 'Andrey Moscovich', birthDate: new Date(2007, 8, 23) }
            };
            const profile = playerProfiles[nick] || { fullname: 'Unknown', birthDate: null };
            const age = profile.birthDate ? calculateAge(profile.birthDate) : '?';

            const avatarMap = {
                'dark_sasi': 'photos/player1.jpg',
                'map1ks': 'photos/player2.jpg',
                'D1amp0': 'photos/player4.jpg',
                'Dew1erMode': 'photos/player3.jpg',
                'lightwork': 'photos/player5.jpg'
            };
            const avatarSrc = avatarMap[nick] || 'photos/player1.jpg';

            // 5v5 метрики
            let totalKills = 0, totalDeaths = 0, totalAssists = 0, totalRounds = 0;
            for (const item of allPlayerMatches) {
                totalKills += item.player.kills || 0;
                totalDeaths += item.player.deaths || 0;
                totalAssists += item.player.assists || 0;
                totalRounds += item.match.teamDoctorsScore + item.match.teamOpponentScore;
            }
            const matchesPlayed = allPlayerMatches.length;
            let kpr = matchesPlayed ? (totalKills / totalRounds) : 0;
            let dpr = matchesPlayed ? (totalDeaths / totalRounds) : 0;
            let apr = matchesPlayed ? (totalAssists / totalRounds) : 0;
            kpr = parseFloat(kpr.toFixed(3));
            dpr = parseFloat(dpr.toFixed(3));
            apr = parseFloat(apr.toFixed(3));

            let totalAdr = 0, totalHs = 0, totalSwing = 0;
            let fullCount = fullMatches.length;
            for (const item of fullMatches) {
                totalAdr += item.player.adr || 0;
                totalHs += item.player.hs_percent || 0;
                totalSwing += item.player.round_swing || 0;
            }
            const avgAdr = fullCount ? (totalAdr / fullCount) : 0;
            const avgHs = fullCount ? (totalHs / fullCount) : 0;
            const avgSwing = fullCount ? (totalSwing / fullCount) : 0;

            const eliteMatches = allPlayerMatches.filter(item => item.match.threat === 'Elite');
            let totalEliteRating = 0;
            for (const item of eliteMatches) totalEliteRating += item.player.rating || 0;
            const eliteRating = eliteMatches.length ? (totalEliteRating / eliteMatches.length) : 0;

            let totalRating = 0;
            for (const item of allPlayerMatches) totalRating += item.player.rating || 0;
            const avgRating = matchesPlayed ? (totalRating / matchesPlayed) : 0;

            // Wingman Rating
            let wingmanTotalRating = 0;
            for (const item of wingmanPlayerMatches) {
                wingmanTotalRating += item.player.rating || 0;
            }
            const wingmanMatchesCount = wingmanPlayerMatches.length;
            const wingmanRating = wingmanMatchesCount ? (wingmanTotalRating / wingmanMatchesCount) : null;

            function getRatingColorStyle(rating) {
                if (rating === null) return '';
                rating = Math.round(rating * 100) / 100;
                if (rating >= 1.50) return '#4096e0';
                if (rating >= 1.25) return '#31b605';
                if (rating >= 1.05) return '#88cc44';
                if (rating >= 0.96) return '';
                return '#ff6666';
            }

            const thresholds = {
                kpr: { 
                    avg: 0.68, minMult: 0.75, maxMult: 1.25, 
                    goodMult: 1.125, badMult: 0.875,
                    invert: false 
                },
                dpr: { 
                    avg: 0.68, minMult: 0.8, maxMult: 1.2, 
                    goodMult: 0.89, badMult: 1.11,
                    invert: true 
                },
                apr: { 
                    avg: 0.23, minMult: 0.65, maxMult: 1.45, 
                    goodMult: 1.175, badMult: 0.825,
                    invert: false 
                },
                adr: { 
                    avg: 80.5, minMult: 0.7, maxMult: 1.3, 
                    goodMult: 1.15, badMult: 0.85,
                    invert: false 
                },
                hs:  { 
                    avg: 51,   minMult: 0.7, maxMult: 1.3, 
                    goodMult: 1.15, badMult: 0.85,
                    invert: false 
                },
                swing: { 
                    avg: 0,   minVal: -2.7, maxVal: 2.7, 
                    good: 1.25, bad: -1.25,
                    invert: false 
                }
            };

            function getBarParams(value, metric) {
                const t = thresholds[metric];
                let norm = value;
                let minVal, maxVal;
                let percent, status, statusClass;

                if (metric === 'swing') {
                    minVal = t.minVal;
                    maxVal = t.maxVal;
                    norm = Math.min(maxVal, Math.max(minVal, norm));
                    percent = ((norm - minVal) / (maxVal - minVal)) * 100;
                    if (norm >= t.good) {
                        status = 'GOOD';
                        statusClass = 'status-good';
                    } else if (norm <= t.bad) {
                        status = 'BAD';
                        statusClass = 'status-bad';
                    } else {
                        status = 'OKAY';
                        statusClass = 'status-ok';
                    }
                } else {
                    const avg = t.avg;
                    const minVal = avg * t.minMult;
                    const maxVal = avg * t.maxMult;
                    let raw = norm;
                    if (!t.invert) {
                        raw = Math.min(maxVal, Math.max(minVal, raw));
                        percent = ((raw - minVal) / (maxVal - minVal)) * 100;
                        if (raw >= avg * t.goodMult) {
                            status = 'GOOD';
                            statusClass = 'status-good';
                        } else if (raw <= avg * t.badMult) {
                            status = 'BAD';
                            statusClass = 'status-bad';
                        } else {
                            status = 'OKAY';
                            statusClass = 'status-ok';
                        }
                    } else {
                        raw = Math.min(maxVal, Math.max(minVal, raw));
                        percent = ((maxVal - raw) / (maxVal - minVal)) * 100;
                        if (raw <= avg * t.goodMult) {
                            status = 'GOOD';
                            statusClass = 'status-good';
                        } else if (raw >= avg * t.badMult) {
                            status = 'BAD';
                            statusClass = 'status-bad';
                        } else {
                            status = 'OKAY';
                            statusClass = 'status-ok';
                        }
                    }
                }
                percent = Math.min(100, Math.max(0, percent));
                if (percent >= 100) {
                    status = 'DEMONIC';
                    statusClass = 'status-demonic';
                }
                return { percent, status, statusClass };
            }

            const barKpr = getBarParams(kpr, 'kpr');
            const barDpr = getBarParams(dpr, 'dpr');
            const barApr = getBarParams(apr, 'apr');
            const barAdr = getBarParams(avgAdr, 'adr');
            const barHs = getBarParams(avgHs, 'hs');
            const barSwing = getBarParams(avgSwing, 'swing');

            function getFillColor(bar) {
                if (bar.status === 'DEMONIC') return '#ffffff';
                if (bar.status === 'GOOD') return '#2ecc71';
                if (bar.status === 'BAD') return '#e74c3c';
                return '#f1c40f';
            }

            function getStatusLabelText(bar) {
                return bar.status;
            }

            const ratingColor = getRatingColorStyle(avgRating);
            const eliteRatingColor = getRatingColorStyle(eliteRating);
            const wingmanRatingColor = getRatingColorStyle(wingmanRating);
            const wingmanDisplay = wingmanRating !== null ? wingmanRating.toFixed(2) : 'N/S';

            const leftHtml = `
                <div class="player-card-left">
                    <img class="player-avatar" src="${avatarSrc}" alt="${nick}">
                    <div class="player-info-area">
                        <div>
                            <div class="player-nick">${nick}</div>
                            <div class="player-fullname">
                                <img src="photos/russia-flag.png" class="player-flag-img" alt="Russia">
                                ${profile.fullname}
                            </div>
                        </div>
                        <div class="player-details">
                            <div class="player-info-row">
                                <div class="info-label">Age</div>
                                <div class="info-value">${age}</div>
                            </div>
                            <div class="player-info-row">
                                <div class="info-label">Current Team</div>
                                <div class="info-value"><a href="index.html" class="current-team-link">Doctors</a></div>
                            </div>
                            <div class="player-info-row">
                                <div class="info-label">Prize Money</div>
                                <div class="info-value">$0</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            function generateBar(bar, label, valueDisplay) {
                const fillClass = bar.status === 'DEMONIC' ? 'bar-fill bar-fill-demonic' : 'bar-fill';
                return `
                    <div class="stat-bar-item">
                        <div class="stat-label">${label}</div>
                        <div class="bar-container"><div class="${fillClass}" style="width: ${bar.percent}%; background-color: ${getFillColor(bar)};"></div></div>
                        <div class="bar-value">${valueDisplay}</div>
                        <div class="bar-status">
                            <span class="${bar.statusClass}">${getStatusLabelText(bar)}</span>
                        </div>
                    </div>
                `;
            }

            const rightHtml = `
                <div class="player-stats-right">
                    <div class="rating-block">
                        <div class="main-rating">Rating: <span style="color: ${ratingColor}">${avgRating.toFixed(2)}</span></div>
                        <div class="elite-rating">Elite Rating: <span style="color: ${eliteRatingColor}">${eliteRating.toFixed(2)}</span></div>
                        <div class="wingman-rating">
                            <input type="checkbox" id="wmRevealToggle" class="wm-toggle-input">
                            <label for="wmRevealToggle" class="wm-toggle-label" title="Показать/скрыть Wingman Rating">
                                <i class="fa-solid fa-chevron-up wm-icon-collapsed"></i>
                                <i class="fa-solid fa-minus wm-icon-expanded"></i>
                            </label>
                            <span class="wm-value">Wingman Rating: <span style="color: ${wingmanRatingColor}">${wingmanDisplay}</span></span>
                        </div>
                    </div>
                    <div class="stats-grid" style="margin-top: 2vh;">
                        <div class="stats-row">
                            ${generateBar(barSwing, 'Round Swing', (avgSwing > 0 ? '+' : '') + avgSwing.toFixed(2) + '%')}
                            ${generateBar(barAdr, 'ADR', avgAdr.toFixed(1))}
                            ${generateBar(barHs, 'HS%', avgHs.toFixed(1) + '%')}
                        </div>
                        <div class="stats-row">
                            ${generateBar(barKpr, 'KPR', kpr.toFixed(2))}
                            ${generateBar(barDpr, 'DPR', dpr.toFixed(2))}
                            ${generateBar(barApr, 'APR', apr.toFixed(2))}
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = leftHtml + rightHtml;

            if (typeof setTheme === 'function' && typeof document.getElementById('themeSwitch') !== 'undefined') {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme) {
                    setTheme(savedTheme === 'dark');
                    const toggle = document.getElementById('themeSwitch');
                    if (toggle) toggle.checked = savedTheme === 'dark';
                }
            }
        })();
    </script>
</body>
</html>
